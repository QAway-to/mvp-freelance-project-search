services:
  - type: web
    name: freelance-agents-mvp
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: MODE
        value: demo
      - key: LOG_LEVEL
        value: INFO
      - key: SEARCH_KEYWORD
        value: бот
      - key: MAX_PROJECTS_PER_SESSION
        value: 3
      - key: EVALUATION_THRESHOLD
        value: 0.7
      - key: SESSION_DURATION_MAX
        value: 120
      - key: PAUSE_BETWEEN_CHECKS
        value: 3600
      - key: PYTHON_VERSION
        value: 3.11.0

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Agents MVP</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Freelance Agents MVP</h1>
            <div class="status">
                <span id="agent-status">Ожидание</span>
                <span id="mode-badge" class="badge">{{ mode }}</span>
            </div>
        </header>

        <div class="controls">
            <button id="start-btn" class="btn btn-primary">▶️ Запустить</button>
            <button id="stop-btn" class="btn btn-danger" disabled>⏹️ Остановить</button>
            <div class="search-info">
                <span>Ключевое слово: <strong>{{ keyword }}</strong></span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>📊 Найдено проектов</h3>
                <div id="projects-count" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <h3>✅ Подходящих</h3>
                <div id="suitable-count" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <h3>🕐 Последняя проверка</h3>
                <div id="last-check" class="stat-value">-</div>
            </div>
        </div>

        <div class="logs-section">
            <h2>📝 Real-time логи</h2>
            <div id="logs-container" class="logs-container">
                <div id="logs" class="logs"></div>
            </div>
            <button id="clear-logs" class="btn btn-secondary">🗑️ Очистить логи</button>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
